name: publish
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bumpType:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for changelogen to see history
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2 # Updated to v2
        with:
          bun-version: latest

      - run: bun install

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish
        run: |
          # Priming npm for Trusted Publishing (OIDC)
          # Even when using Bun, changelogen typically calls npm under the hood for the actual registry upload
          npm config set //registry.npmjs.org/:_authToken "unused"
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "🚀 Starting Official Release..."
            bunx changelogen@latest --${{ github.event.inputs.bumpType }} --release --push --publish --provenance
          else
            echo "🐥 Starting Nightly Canary..."
            bunx changelogen@latest --canary --publish --publishTag canary --provenance
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}