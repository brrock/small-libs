name: publish
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bumpType:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for changelogen to see history
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish
        run: |
          # The "unused" token is what triggers the OIDC flow in the npm client
          npm config set //registry.npmjs.org/:_authToken "unused"
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "🚀 Starting Official Release..."
            # Using bunx for speed/consistency
            bunx changelogen@latest --${{ github.event.inputs.bumpType }} --release --push --publish --provenance
          else
            echo "🐥 Starting Nightly Canary..."
            # We add --no-git because Canaries shouldn't create local tags in the CI
            bunx changelogen@latest --canary --publish --publishTag canary --provenance --no-git
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}