name: publish
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bumpType:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for changelogen to see history
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish
        run: |
          # Configure npm for OIDC (this is required for the machine handshake)
          npm config set //registry.npmjs.org/:_authToken "unused"
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "🚀 Starting Official Release..."
            # Let changelogen handle everything for official releases
            bunx changelogen@latest --${{ github.event.inputs.bumpType }} --release --push --publish --provenance
          else
            echo "🐥 Starting Nightly Canary..."
            # 1. Let changelogen bump version & generate changelog (NO publish)
            bunx changelogen@latest --canary --no-git
            
            # 2. Use the raw npm client for the actual publish
            # This is more robust for Trusted Publishing
            npm publish --tag canary --access public --provenance
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}